<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800&family=Archivo:wght@600;700;800;900&family=Anton&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;}</style>
</helmet>
<div ref="{{ rootRef }}" style="--bg:#0E1A2B;--line:#F2A01E;--font:#FFFFFF;--accent:#F2A01E;--ff:'Saira Condensed',sans-serif;--radius:0px;width:1920px;height:1080px;background:var(--bg);color:var(--font);font-family:var(--ff);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:52px;padding:56px 64px;overflow:hidden;text-transform:uppercase;">

  <!-- TOP BAR : pair names, flags, sets-won -->
  <div style="width:100%;background:var(--line);display:flex;gap:6px;padding:6px;border-radius:var(--radius);">
    <div style="flex:1;min-width:0;background:var(--bg);display:flex;align-items:center;gap:26px;padding:16px 28px;border-radius:var(--radius);">
      <div data-serve="A" style="display:none;width:46px;height:46px;border-radius:50%;background:var(--accent);flex:none;"></div>
      <div data-flag style="width:124px;height:90px;flex:none;border-radius:var(--radius);background:repeating-linear-gradient(45deg,rgba(255,255,255,.14),rgba(255,255,255,.14) 8px,rgba(255,255,255,.05) 8px,rgba(255,255,255,.05) 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:22px;letter-spacing:1px;color:rgba(255,255,255,.72);">BRA</div>
      <div style="display:flex;flex-direction:column;line-height:.95;font-weight:700;font-size:46px;letter-spacing:.5px;min-width:0;">
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Naraphornrapat</span>
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Worapeerachayakorn</span>
      </div>
    </div>
    <div style="width:150px;background:var(--font);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:116px;font-weight:800;line-height:1;border-radius:var(--radius);">2</div>
    <div style="width:150px;background:var(--font);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:116px;font-weight:800;line-height:1;border-radius:var(--radius);">0</div>
    <div style="flex:1;min-width:0;background:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:26px;padding:16px 28px;border-radius:var(--radius);">
      <div data-serve="B" style="width:46px;height:46px;border-radius:50%;background:var(--accent);flex:none;"></div>
      <div style="display:flex;align-items:center;gap:26px;min-width:0;">
        <div style="display:flex;flex-direction:column;align-items:flex-end;text-align:right;line-height:.95;font-weight:700;font-size:46px;letter-spacing:.5px;min-width:0;">
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Naraphornrapat</span>
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Worapeerachayakorn</span>
        </div>
        <div data-flag style="width:124px;height:90px;flex:none;border-radius:var(--radius);background:repeating-linear-gradient(45deg,rgba(255,255,255,.14),rgba(255,255,255,.14) 8px,rgba(255,255,255,.05) 8px,rgba(255,255,255,.05) 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:22px;letter-spacing:1px;color:rgba(255,255,255,.72);">JPN</div>
      </div>
    </div>
  </div>

  <!-- COMPETITION LOGO SLOT (transparent .png drop area) -->
  <div data-logo style="width:640px;height:150px;border:3px dashed color-mix(in srgb,var(--font) 42%,transparent);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-transform:none;">
    <span style="font-family:ui-monospace,monospace;font-size:26px;letter-spacing:2px;color:color-mix(in srgb,var(--font) 72%,transparent);">COMPETITION LOGO</span>
    <span style="font-family:ui-monospace,monospace;font-size:15px;letter-spacing:1px;color:color-mix(in srgb,var(--font) 46%,transparent);">transparent .png · centered</span>
  </div>

  <!-- SET INDICATOR -->
  <div style="display:flex;align-items:center;gap:34px;">
    <div style="width:54px;height:54px;background:var(--accent);border-radius:var(--radius);"></div>
    <div style="font-size:76px;font-weight:800;letter-spacing:3px;">Set 3</div>
    <div style="width:54px;height:54px;background:var(--accent);border-radius:var(--radius);"></div>
  </div>

  <!-- BIG CURRENT SET SCORE + SET-BY-SET LADDER -->
  <div style="width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;column-gap:48px;">
    <div style="display:flex;align-items:center;justify-content:center;gap:32px;">
      <div style="font-size:300px;font-weight:800;line-height:.74;">10</div>
    </div>

    <div style="display:flex;align-items:center;gap:28px;">
      <div style="display:flex;flex-direction:column;font-size:64px;font-weight:800;line-height:1;">
        <div style="height:88px;display:flex;align-items:center;justify-content:flex-end;text-decoration:underline;text-decoration-color:var(--accent);text-decoration-thickness:6px;text-underline-offset:8px;">29</div>
        <div style="height:88px;display:flex;align-items:center;justify-content:flex-end;text-decoration:underline;text-decoration-color:var(--accent);text-decoration-thickness:6px;text-underline-offset:8px;">28</div>
        <div style="height:88px;"></div>
      </div>
      <div style="border:5px solid var(--accent);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;font-size:58px;font-weight:800;">
        <div style="width:88px;height:88px;display:flex;align-items:center;justify-content:center;border-bottom:5px solid var(--accent);">1</div>
        <div style="width:88px;height:88px;display:flex;align-items:center;justify-content:center;border-bottom:5px solid var(--accent);">2</div>
        <div style="width:88px;height:88px;display:flex;align-items:center;justify-content:center;background:var(--accent);color:var(--bg);">3</div>
      </div>
      <div style="display:flex;flex-direction:column;font-size:64px;font-weight:800;line-height:1;">
        <div style="height:88px;display:flex;align-items:center;opacity:.42;">27</div>
        <div style="height:88px;display:flex;align-items:center;opacity:.42;">26</div>
        <div style="height:88px;"></div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:32px;">
      <div style="font-size:300px;font-weight:800;line-height:.74;">11</div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1920, &quot;height&quot;: 1080},
  &quot;bgColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#0E1A2B&quot;, &quot;options&quot;: [&quot;#0E1A2B&quot;, &quot;#4E0A12&quot;, &quot;#161FBE&quot;, &quot;#46177D&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},
  &quot;lineColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F2A01E&quot;, &quot;options&quot;: [&quot;#F2A01E&quot;, &quot;#ED1846&quot;, &quot;#1FE3F2&quot;, &quot;#E5198C&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},
  &quot;fontColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FFFFFF&quot;, &quot;options&quot;: [&quot;#FFFFFF&quot;, &quot;#0E1A2B&quot;, &quot;#111111&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},
  &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F2A01E&quot;, &quot;options&quot;: [&quot;#F2A01E&quot;, &quot;#ED1846&quot;, &quot;#1FE3F2&quot;, &quot;#E5198C&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},
  &quot;fontFamily&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Saira Condensed&quot;, &quot;options&quot;: [&quot;Saira Condensed&quot;, &quot;Barlow Condensed&quot;, &quot;Archivo&quot;, &quot;Anton&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;},
  &quot;serving&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;B&quot;, &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;, &quot;None&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Match&quot;},
  &quot;showLogo&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot;},
  &quot;cornerStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Sharp&quot;, &quot;options&quot;: [&quot;Sharp&quot;, &quot;Rounded&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Layout&quot;}
}">
class Component extends DCLogic {
  applyState(node){
    if(!node) return;
    const p = this.props || {};
    const set = (k,v)=>{ if(v!=null && v!=='') node.style.setProperty(k,v); };
    set('--bg',p.bgColor); set('--line',p.lineColor); set('--font',p.fontColor); set('--accent',p.accentColor);
    if(p.fontFamily) node.style.setProperty('--ff', "'"+p.fontFamily+"', sans-serif");
    if(p.cornerStyle) node.style.setProperty('--radius', p.cornerStyle==='Rounded'?'16px':'0px');
    const serve = p.serving || 'B';
    node.querySelectorAll('[data-serve]').forEach(el=>{ el.style.alignSelf = 'flex-start'; el.style.display = (el.getAttribute('data-serve')===serve) ? 'flex' : 'none'; });
    const logo = node.querySelector('[data-logo]'); if(logo) logo.style.visibility = (p.showLogo===false)?'hidden':'visible';
  }
  componentDidMount(){ this.applyState(this._root); }
  componentDidUpdate(){ this.applyState(this._root); }
  renderVals(){
    return { rootRef: (n)=>{ this._root = n; this.applyState(n); } };
  }
}
</script>
</body>
</html>
